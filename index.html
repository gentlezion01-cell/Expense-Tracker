<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kala — Expense Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="logo">
        <span class="logo-icon">K</span>
        <h1>Kala</h1>
      </div>
      <p class="tagline">Track your money, own your tomorrow.</p>
    </header>

    <div class="card form-card">
      <h2 class="card-title">New Expense</h2>
      <form id="expense-form">
        <div class="form-row">
          <div class="input-group">
            <label for="expense-name">What did you spend on?</label>
            <input type="text" id="expense-name" placeholder="e.g. Groceries, Fuel, Data" required>
          </div>
          <div class="input-group">
            <label for="expense-amount">Amount (₦)</label>
            <input type="number" id="expense-amount" placeholder="e.g. 500" min="0" step="100" required>
          </div>
        </div>
        <div class="form-row">
          <div class="input-group">
            <label for="expense-category">Category</label>
            <select id="expense-category">
              <option value="Food & Drinks">🍔 Food & Drinks</option>
              <option value="Transport">🚗 Transport</option>
              <option value="Utilities">💡 Utilities</option>
              <option value="Entertainment">🎬 Entertainment</option>
              <option value="Health">💊 Health</option>
              <option value="Shopping">🛍️ Shopping</option>
              <option value="Education">📚 Education</option>
              <option value="Other">📦 Other</option>
            </select>
          </div>
          <div class="input-group">
            <label>&nbsp;</label>
            <button type="submit" id="add-btn">Add Expense</button>
          </div>
        </div>
      </form>
    </div>

    <div class="card summary-card">
      <div class="total-box">
        <div class="total-left">
          <span class="total-label">Total Spent</span>
          <span class="total-amount" id="total-amount">₦0</span>
        </div>
        <div class="total-right">
          <span class="count-label">Expenses</span>
          <span class="expense-count" id="expense-count">0</span>
        </div>
      </div>
      <div class="category-breakdown" id="category-breakdown"></div>
    </div>

    <div class="card list-card">
      <div class="list-header">
        <h2 class="card-title">All Expenses</h2>
        <div class="list-actions">
          <div class="search-box">
            <input type="text" id="search-input" placeholder="Search expenses...">
          </div>
          <div class="sort-box">
            <select id="sort-select">
              <option value="newest">Newest First</option>
              <option value="oldest">Oldest First</option>
              <option value="highest">Highest Amount</option>
              <option value="lowest">Lowest Amount</option>
              <option value="a-z">A–Z</option>
              <option value="z-a">Z–A</option>
            </select>
          </div>
        </div>
      </div>
      <div class="filter-chips" id="filter-chips"></div>
      <div id="expense-list">
        <p class="empty-msg">No expenses yet. Start tracking today.</p>
      </div>
      <div class="list-footer" id="list-footer">
        <button class="export-btn" id="export-btn">Export CSV</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="edit-modal">
    <div class="modal">
      <h3 class="modal-title">Edit Expense</h3>
      <form id="edit-form">
        <div class="input-group">
          <label for="edit-name">Expense Name</label>
          <input type="text" id="edit-name" required>
        </div>
        <div class="input-group">
          <label for="edit-amount">Amount (₦)</label>
          <input type="number" id="edit-amount" min="0" step="100" required>
        </div>
        <div class="input-group">
          <label for="edit-category">Category</label>
          <select id="edit-category">
            <option value="Food & Drinks">🍔 Food & Drinks</option>
            <option value="Transport">🚗 Transport</option>
            <option value="Utilities">💡 Utilities</option>
            <option value="Entertainment">🎬 Entertainment</option>
            <option value="Health">💊 Health</option>
            <option value="Shopping">🛍️ Shopping</option>
            <option value="Education">📚 Education</option>
            <option value="Other">📦 Other</option>
          </select>
        </div>
        <div class="modal-actions">
          <button type="button" class="cancel-btn" id="cancel-edit">Cancel</button>
          <button type="submit" class="save-btn">Save</button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
